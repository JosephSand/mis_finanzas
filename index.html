<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceFlow Pro | Control Contable Real</title>
    
    <!-- Configuración para Apple Web App (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinanceFlow">
    
    <!-- Icono para Apple (Visible al guardar la app en el menú de inicio) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .print-card { border: 1px solid #e2e8f0 !important; box-shadow: none !important; break-inside: avoid; }
        }

        .print-only { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            return (
                <div className="fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl animate-in bg-slate-900 text-white border border-slate-700">
                    <Icon name={type === 'success' ? 'check-circle' : 'info'} className={type === 'success' ? 'text-emerald-400' : 'text-blue-400'} />
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        };

        // --- APP PRINCIPAL ---

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState(null);
            
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('financeflow_contable_v1');
                const lastReset = localStorage.getItem('financeflow_last_reset');
                const currentMonth = new Date().toISOString().slice(0, 7); // YYYY-MM
                
                let data = saved ? JSON.parse(saved) : [];

                if (lastReset !== currentMonth) {
                    // PURGA MENSUAL: El primero de cada mes se limpian ingresos y gastos variables.
                    // Los Gastos Fijos se mantienen pero se reinicia su marcador de pago.
                    data = data.filter(t => t.type === 'fixed').map(t => ({
                        ...t,
                        isPaid: false,
                        lastPaidMonth: ''
                    }));
                    localStorage.setItem('financeflow_last_reset', currentMonth);
                }
                return data;
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newTransaction, setNewTransaction] = useState({
                type: 'expense', category: '', amount: '', description: '', date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                localStorage.setItem('financeflow_contable_v1', JSON.stringify(transactions));
                lucide.createIcons();
            }, [transactions, activeTab, isSidebarCollapsed]);

            const showToast = (message, type = 'success') => setToast({ message, type });

            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + Number(t.amount), 0);
                const fixedItems = transactions.filter(t => t.type === 'fixed');
                const variable = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + Number(t.amount), 0);
                const savings = transactions.filter(t => t.type === 'saving').reduce((acc, t) => acc + Number(t.amount), 0);

                const totalFixed = fixedItems.reduce((acc, t) => acc + Number(t.amount), 0);
                const paidFixed = fixedItems.filter(t => t.isPaid).reduce((acc, t) => acc + Number(t.amount), 0);
                const pendingFixed = totalFixed - paidFixed;
                
                // SALDO REAL: Dinero disponible basado en pagos fijos ya realizados
                const realBalance = income - (paidFixed + variable + savings);
                const projectedBalance = income - (totalFixed + variable + savings);
                const savingsRate = income > 0 ? ((savings / income) * 100).toFixed(1) : 0;

                return { income, totalFixed, paidFixed, pendingFixed, variable, savings, realBalance, projectedBalance, savingsRate };
            }, [transactions]);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!newTransaction.amount || !newTransaction.category) return;
                const item = { 
                    ...newTransaction, 
                    id: Date.now(), 
                    amount: Number(newTransaction.amount),
                    isPaid: newTransaction.type === 'income',
                    lastPaidMonth: ''
                };
                setTransactions(prev => [...prev, item]);
                setIsModalOpen(false);
                setNewTransaction({ type: 'expense', category: '', amount: '', description: '', date: new Date().toISOString().split('T')[0] });
                showToast("Registro guardado con éxito");
            };

            const togglePaidStatus = (id) => {
                const currentMonth = new Date().toISOString().slice(0, 7);
                setTransactions(prev => prev.map(t => {
                    if (t.id === id) {
                        const newStatus = !t.isPaid;
                        return { ...t, isPaid: newStatus, lastPaidMonth: newStatus ? currentMonth : '' };
                    }
                    return t;
                }));
            };

            const deleteTransaction = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showToast("Registro eliminado", "info");
            };

            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'income', label: 'Ingresos', icon: 'trending-up' },
                { id: 'fixed', label: 'Gastos Fijos', icon: 'calendar-check' },
                { id: 'expense', label: 'Variables', icon: 'shopping-bag' },
                { id: 'saving', label: 'Ahorros', icon: 'piggy-bank' },
                { id: 'report', label: 'Cierre de Mes', icon: 'file-text' },
            ];

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar Desktop */}
                    <aside className={`no-print hidden md:flex flex-col bg-slate-950 text-white transition-all duration-500 relative ${isSidebarCollapsed ? 'w-20' : 'w-72'}`}>
                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="absolute -right-3 top-12 bg-indigo-600 text-white rounded-full p-1.5 shadow-xl z-50">
                            <Icon name={isSidebarCollapsed ? "chevron-right" : "chevron-left"} className="w-4 h-4" />
                        </button>
                        <div className="p-8">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-indigo-500/30">
                                    <Icon name="briefcase" className="text-white w-5 h-5" />
                                </div>
                                {!isSidebarCollapsed && (
                                    <div className="overflow-hidden">
                                        <h1 className="text-lg font-black tracking-tight leading-none uppercase">FinanceFlow</h1>
                                        <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">SISTEMA CONTABLE</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            {menuItems.map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-600/20' : 'text-slate-500 hover:text-white hover:bg-slate-900'} ${isSidebarCollapsed ? 'justify-center' : ''}`}>
                                    <Icon name={item.icon} />
                                    {!isSidebarCollapsed && <span className="font-bold text-xs uppercase tracking-wider">{item.label}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6">
                            <div className={`bg-slate-900 rounded-2xl p-4 border border-slate-800 ${isSidebarCollapsed ? 'p-2 flex justify-center' : ''}`}>
                                <Icon name="activity" className={stats.realBalance >= 0 ? 'text-emerald-400' : 'text-rose-400'} />
                                {!isSidebarCollapsed && <p className="mt-2 text-[9px] font-black text-slate-500 uppercase tracking-tighter">Saldo Real</p>}
                                {!isSidebarCollapsed && <p className="text-xl font-black text-white">${stats.realBalance.toLocaleString()}</p>}
                            </div>
                        </div>
                    </aside>

                    {/* Menú Móvil */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[60] md:hidden bg-slate-950 p-8 animate-in text-white">
                            <div className="flex justify-between items-center mb-12">
                                <h1 className="text-2xl font-black uppercase">Menu</h1>
                                <button onClick={() => setIsMobileMenuOpen(false)}><Icon name="x" className="w-8 h-8" /></button>
                            </div>
                            <nav className="space-y-4">
                                {menuItems.map((item) => (
                                    <button key={item.id} onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-6 p-5 rounded-3xl text-lg font-black uppercase ${activeTab === item.id ? 'bg-indigo-600' : 'text-slate-600'}`}>
                                        <Icon name={item.icon} className="w-6 h-6" /> {item.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-50">
                        <header className="no-print bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-40">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(true)} className="md:hidden p-2 text-slate-600"><Icon name="menu" /></button>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">
                                    {menuItems.find(i => i.id === activeTab).label} — {new Date().toLocaleDateString('es-ES', { month: 'long' })}
                                </h2>
                            </div>
                            <div className="flex gap-2">
                                {activeTab === 'report' && (
                                    <button onClick={() => window.print()} className="bg-slate-800 text-white px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-bold shadow-lg transition-transform active:scale-95">
                                        <Icon name="printer" className="w-4 h-4" /> <span className="hidden sm:inline">Imprimir Cierre</span>
                                    </button>
                                )}
                                <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 text-sm font-bold shadow-lg shadow-indigo-200 transition-transform active:scale-95">
                                    <Icon name="plus" className="w-4 h-4" /> <span>Nuevo</span>
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-5xl mx-auto">
                                {activeTab === 'dashboard' && <Dashboard stats={stats} transactions={transactions} />}
                                {activeTab === 'income' && <ListView title="Entradas de Dinero" data={transactions.filter(t => t.type === 'income')} onDelete={deleteTransaction} />}
                                {activeTab === 'fixed' && <FixedView data={transactions.filter(t => t.type === 'fixed')} onDelete={deleteTransaction} onToggle={togglePaidStatus} />}
                                {activeTab === 'expense' && <ListView title="Gastos Variables" data={transactions.filter(t => t.type === 'expense')} onDelete={deleteTransaction} />}
                                {activeTab === 'saving' && <ListView title="Ahorros" data={transactions.filter(t => t.type === 'saving')} onDelete={deleteTransaction} />}
                                {activeTab === 'report' && <ReportView stats={stats} transactions={transactions} />}
                            </div>
                        </div>
                    </main>

                    {/* Modal Registro */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg shadow-2xl relative animate-in border border-slate-100">
                                <h3 className="text-xl font-black text-slate-800 mb-6 uppercase tracking-tight">Nueva Operación</h3>
                                <form onSubmit={handleAddTransaction} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Categoría</label>
                                            <select value={newTransaction.type} onChange={(e) => setNewTransaction({...newTransaction, type: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-3.5 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-600">
                                                <option value="income">Ingreso</option>
                                                <option value="fixed">Gasto Fijo (Mensual)</option>
                                                <option value="expense">Gasto Variable</option>
                                                <option value="saving">Ahorro</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2 sm:col-span-1">
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Importe ($)</label>
                                            <input type="number" step="0.01" required placeholder="0.00" value={newTransaction.amount} onChange={(e) => setNewTransaction({...newTransaction, amount: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-3.5 font-black text-lg text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-600" />
                                        </div>
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">Concepto</label>
                                        <input type="text" required placeholder="Ej: Renta, Sueldo..." value={newTransaction.category} onChange={(e) => setNewTransaction({...newTransaction, category: e.target.value})} className="w-full bg-slate-50 rounded-xl border-none ring-1 ring-slate-200 p-3.5 font-bold outline-none focus:ring-2 focus:ring-indigo-600" />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">Confirmar e Insertar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        // --- COMPONENTES DE VISTA ---

        function Dashboard({ stats, transactions }) {
            return (
                <div className="space-y-8 animate-in">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <KPICard title="Ingresos" value={stats.income} color="indigo" icon="arrow-up-right" />
                        <KPICard title="Saldo Real" value={stats.realBalance} color="emerald" icon="wallet" />
                        <KPICard title="Comprometido" value={stats.pendingFixed} color="amber" icon="lock" />
                        <KPICard title="Ahorro" value={stats.savings} color="purple" icon="piggy-bank" />
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Estado de Gastos Fijos</h3>
                            <div className="space-y-6">
                                {transactions.filter(t => t.type === 'fixed').map(t => (
                                    <div key={t.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-3 h-3 rounded-full ${t.isPaid ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]' : 'bg-rose-400 shadow-[0_0_8px_rgba(248,113,113,0.5)]'}`}></div>
                                            <span className={`font-bold text-sm ${t.isPaid ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{t.category}</span>
                                        </div>
                                        <span className="font-black text-sm text-slate-900">${t.amount.toLocaleString()}</span>
                                    </div>
                                ))}
                                {transactions.filter(t => t.type === 'fixed').length === 0 && <p className="text-slate-300 text-sm italic">Sin registros.</p>}
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col">
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Métricas</h3>
                            <Metric label="Gastos Fijos" value={stats.totalFixed} total={stats.income} color="bg-indigo-500" />
                            <Metric label="Variables" value={stats.variable} total={stats.income} color="bg-orange-500" />
                            <Metric label="Ahorro" value={stats.savings} total={stats.income} color="bg-purple-500" />
                        </div>
                    </div>
                </div>
            );
        }

        function ListView({ title, data, onDelete }) {
            return (
                <div className="animate-in space-y-6">
                    <h3 className="text-2xl font-black tracking-tight">{title}</h3>
                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <tr>
                                    <th className="px-8 py-4">Concepto</th>
                                    <th className="px-8 py-4">Fecha</th>
                                    <th className="px-8 py-4 text-right">Monto</th>
                                    <th className="px-8 py-4 w-16"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {data.map(t => (
                                    <tr key={t.id} className="hover:bg-slate-50/50 transition-all group text-sm">
                                        <td className="px-8 py-4 font-bold text-slate-800">{t.category}</td>
                                        <td className="px-8 py-4 text-slate-500 font-medium">{t.date}</td>
                                        <td className="px-8 py-4 text-right font-black">${t.amount.toLocaleString()}</td>
                                        <td className="px-8 py-4 text-right">
                                            <button onClick={() => onDelete(t.id)} className="p-2 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" className="w-4 h-4" /></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function FixedView({ data, onDelete, onToggle }) {
            return (
                <div className="animate-in space-y-6">
                    <h3 className="text-2xl font-black tracking-tight">Gastos Fijos</h3>
                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                <tr>
                                    <th className="px-8 py-5 w-20 text-center">Pago</th>
                                    <th className="px-8 py-5">Concepto</th>
                                    <th className="px-8 py-5 text-right">Monto</th>
                                    <th className="px-8 py-5 w-16"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {data.map(t => (
                                    <tr key={t.id} className={`hover:bg-slate-50 transition-all group ${t.isPaid ? 'opacity-50' : ''}`}>
                                        <td className="px-8 py-5 text-center">
                                            <button onClick={() => onToggle(t.id)} className={`w-10 h-10 rounded-2xl border-2 flex items-center justify-center transition-all ${t.isPaid ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200 text-transparent hover:border-emerald-300'}`}>
                                                <Icon name="check" className="w-5 h-5" />
                                            </button>
                                        </td>
                                        <td className="px-8 py-5 font-bold text-slate-800 text-sm">{t.category}</td>
                                        <td className="px-8 py-5 text-right font-black text-sm">${t.amount.toLocaleString()}</td>
                                        <td className="px-8 py-5 text-right">
                                            <button onClick={() => onDelete(t.id)} className="p-2 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" className="w-4 h-4" /></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function ReportView({ stats }) {
            const currentMonth = new Date().toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            return (
                <div className="animate-in pb-10">
                    <div className="print-card bg-white p-12 rounded-[3rem] border border-slate-200 shadow-xl">
                        <div className="flex justify-between items-start border-b-2 border-slate-100 pb-8 mb-10">
                            <h1 className="text-3xl font-black text-slate-950 uppercase tracking-tighter">Cierre Mensual — <span className="text-indigo-600">{currentMonth}</span></h1>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-10">
                            <div className="p-6 bg-slate-50 rounded-3xl"><p className="text-[10px] font-black text-slate-400 mb-2 uppercase">Ingresos</p><p className="text-2xl font-black">${stats.income.toLocaleString()}</p></div>
                            <div className="p-6 bg-slate-50 rounded-3xl"><p className="text-[10px] font-black text-slate-400 mb-2 uppercase">Egresos Totales</p><p className="text-2xl font-black">${(stats.totalFixed + stats.variable + stats.savings).toLocaleString()}</p></div>
                            <div className="p-6 bg-indigo-600 text-white rounded-3xl"><p className="text-[10px] font-black text-indigo-200 mb-2 uppercase">Balance Final</p><p className="text-2xl font-black">${stats.realBalance.toLocaleString()}</p></div>
                        </div>
                    </div>
                </div>
            );
        }

        function KPICard({ title, value, color, icon }) {
            const colors = {
                indigo: "bg-indigo-50 text-indigo-600 border-indigo-100",
                emerald: "bg-emerald-50 text-emerald-600 border-emerald-100",
                amber: "bg-amber-50 text-amber-600 border-amber-100",
                purple: "bg-purple-50 text-purple-600 border-purple-100",
            };
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col gap-4 transition-all hover:border-indigo-300">
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center border shrink-0 ${colors[color]}`}><Icon name={icon} /></div>
                    <div>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</p>
                        <p className="text-2xl font-black text-slate-900 mt-1">${value.toLocaleString()}</p>
                    </div>
                </div>
            );
        }

        function Metric({ label, value, total, color }) {
            const p = total > 0 ? Math.min((value / total) * 100, 100) : 0;
            return (
                <div className="space-y-2 mb-6 last:mb-0">
                    <div className="flex justify-between text-[10px] font-black text-slate-500 uppercase"><span>{label}</span><span>{p.toFixed(0)}%</span></div>
                    <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${p}%` }}></div></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
